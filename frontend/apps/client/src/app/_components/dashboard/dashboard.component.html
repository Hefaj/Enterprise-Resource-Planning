<form
  [formGroup]="myDynamicForm"
  (ngSubmit)="save()"
>
  <div class="flex flex-col gap-4">
    <e-input-text
      [config]="textConfig"
      [control]="control"
    />

    <e-input-text
      [config]="textConfig2"
      [control]="control2"
    />
  </div>

  <e-button
    [config]="saveBtn"
    (click)="save()"
    [loading]="isLoading()"
    >Save</e-button
  >
</form>
