@let _menuConfig = menuConfig(); @let _breadcrumbConfig = breadcrumbConfig();

<erp-drawer #drawer>
  <erp-panel-menu [config]="_menuConfig" />
</erp-drawer>

<div class="flex flex-col h-svh w-svw bg-slate-50 dark:bg-slate-900">
  <div class="h-16 flex items-center px-6 bg-white dark:bg-slate-900 shadow-xl">
    <erp-button
      [config]="menuBtn"
      (click)="drawer.show()"
    />
    <erp-breadcrumb [config]="_breadcrumbConfig" />
  </div>
  <main class="flex-1 overflow-auto p-4">
    <ng-content>
      <erp-empty-card />
    </ng-content>
  </main>
</div>
