@let _menuConfig = menuConfig();

<core-drawer #drawer>
  <core-panel-menu [config]="_menuConfig" />
</core-drawer>

<div class="flex flex-col h-svh w-svw bg-slate-50 dark:bg-slate-900">
  <div class="h-16 flex items-center px-6 bg-white dark:bg-slate-900 shadow-xl">
    <core-button
      [config]="menuBtn"
      (click)="drawer.show()"
    />
    <h1 class="text-xl font-bold text-slate-800 dark:text-white">Enterprise Shell</h1>
  </div>
  <main class="flex-1 overflow-auto p-4">
    <ng-content>
      <core-empty-card />
    </ng-content>
  </main>
</div>
