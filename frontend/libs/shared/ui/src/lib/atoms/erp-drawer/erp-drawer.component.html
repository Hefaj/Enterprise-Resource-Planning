<p-drawer
  [(visible)]="visible"
  [closable]="false"
  [styleClass]="'!w-80 border-r border-slate-200 dark:border-slate-800 shadow-2xl'"
>
  <ng-template #header>
    <span class="font-bold text-slate-700 dark:text-slate-200">Menu</span>
  </ng-template>

  <div class="py-4">
    <ng-content />
  </div>

  <ng-template #footer>
    <small class="text-slate-400">v1.0.0 (v21.0.0)</small>
  </ng-template>
</p-drawer>
