<div class="flex flex-col min-h-screen bg-gray-50 dark:bg-zinc-950">
  <header
    class="flex items-center justify-between h-16 px-4 bg-white border-b border-gray-200 dark:bg-zinc-900 dark:border-zinc-800 shadow-sm z-10 relative"
  >
    <div class="flex items-center gap-4">
      <erp-menu />

      <erp-breadcrumb
        [$items]="$items()"
        [$home]="$home()"
      />
    </div>

    <div class="flex items-center gap-3">
      <button
        class="relative p-2 text-gray-500 rounded-lg hover:bg-gray-100 hover:text-gray-900 dark:text-gray-400 dark:hover:bg-zinc-800 dark:hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-sky-500"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
          ></path>
        </svg>
        <span
          class="absolute top-1.5 right-1.5 block h-2.5 w-2.5 rounded-full bg-red-500 ring-2 ring-white dark:ring-zinc-900"
        ></span>
      </button>

      <div class="hidden sm:block w-px h-6 bg-gray-200 dark:bg-zinc-700 mx-1"></div>

      <button
        class="flex items-center gap-2 p-1 pl-2 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors focus:outline-none focus:ring-2 focus:ring-sky-500"
        (click)="logout()"
      >
        <span class="hidden sm:block text-sm font-medium text-gray-700 dark:text-gray-300">Jan K.</span>
        <div
          class="h-8 w-8 rounded-full bg-gradient-to-tr from-sky-500 to-blue-600 flex items-center justify-center text-white font-bold text-xs shadow-inner"
        >
          JK
        </div>
      </button>
    </div>
  </header>

  <main class="flex-1 flex flex-col">
    <div class="flex-1 w-full p-4 md:p-6">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
