<div style="min-height: 100vh; background: var(--tui-background-neutral-1); color: var(--tui-text-primary); font-family: var(--tui-font-heading); display: flex; flex-direction: column;">
  <!-- Shell Header -->
  <header style="border-bottom: 1px solid var(--tui-border-normal); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; background: var(--tui-background-neutral-2); position: sticky; top: 0; z-index: 50;">
    <!-- Left side: Breadcrumbs -->
    <div style="display: flex; align-items: center; gap: 1rem;">
      <!-- Navigation Menu Toggle Button -->
      <erp-button
        [config]="menuButtonConfig"
        style="cursor: pointer; border-radius: var(--tui-radius-m); border: 1px solid var(--tui-border-normal); background: var(--tui-background-neutral-1); color: var(--tui-text-primary); width: 2.5rem; height: 2.5rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;"
        title="Menu nawigacji"
      />
      
      <erp-breadcrumb [config]="breadcrumbConfig" />
    </div>

    <!-- Right side: Theme toggle -->
    <div style="display: flex; align-items: center; gap: 0.75rem;">
      <!-- Theme Toggle -->
      <erp-button
        [config]="themeButtonConfig"
        style="cursor: pointer; border-radius: var(--tui-radius-m); border: 1px solid var(--tui-border-normal); background: var(--tui-background-neutral-1); color: var(--tui-text-primary); width: 2.5rem; height: 2.5rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;"
        [title]="isDarkMode() ? 'Jasny motyw' : 'Ciemny motyw'"
      />
    </div>
  </header>

  <!-- Shell Main Content -->
  <main style="flex: 1; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box;">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Navigation Drawer Menu -->
<erp-drawer [config]="menuDrawerConfig" />
