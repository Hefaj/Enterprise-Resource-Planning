@let _hostLayoutConfig = $hostLayoutConfig();

<erp-host-layout [config]="_hostLayoutConfig">
  <erp-panel-menu menu [config]="$navMenu()" />
  <erp-breadcrumb breadcrumb [config]="$breadcrumbConfig()" class="w-full" />
  
  <erp-job-popover-lazy header-actions [onSelection]="onJobSelection" />
  
  <erp-user-menu user-menu [config]="$userMenuConfig()" />

  <router-outlet></router-outlet>
</erp-host-layout>
