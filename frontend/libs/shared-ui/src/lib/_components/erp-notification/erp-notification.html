<div class="card flex justify-center">
  <button
    (click)="op.toggle($event)"
    class="relative p-2 text-gray-500 rounded-lg hover:bg-gray-100 hover:text-gray-900 dark:text-gray-400 dark:hover:bg-zinc-800 dark:hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-sky-500"
  >
    <svg
      class="w-6 h-6"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
      ></path>
    </svg>
    <span
      class="absolute top-1.5 right-1.5 block h-2.5 w-2.5 rounded-full bg-red-500 ring-2 ring-white dark:ring-zinc-900"
    ></span>
  </button>

  <p-popover #op>
    <div class="flex flex-col gap-4 w-[25rem]">
      <div>
        <span class="font-medium text-surface-900 dark:text-surface-0 block mb-2">Share this document</span>
        <p-inputgroup>
          <input
            pInputText
            value="https://primeng.org/12323ff26t2g243g423g234gg52hy25XADXAG3"
            readonly
            class="w-[25rem]"
          />
          <!-- <p-inputgroup-addon>
            <i class="pi pi-copy"></i>
          </p-inputgroup-addon> -->
        </p-inputgroup>
      </div>
      <div>
        <span class="font-medium text-surface-900 dark:text-surface-0 block mb-2">Invite Member</span>
        <div class="flex">
          <p-inputgroup>
            <input
              pInputText
              disabled
            />
            <button
              pButton
              label="Invite"
              icon="pi pi-users"
            ></button>
          </p-inputgroup>
        </div>
      </div>
      <div>
        <span class="font-medium text-surface-900 dark:text-surface-0 block mb-2">Team Members</span>
        <ul class="list-none p-0 m-0 flex flex-col gap-4">
          @for (member of members; track member) {
          <li class="flex items-center gap-2">
            <img
              [src]="'https://primefaces.org/cdn/primeng/images/demo/avatar/' + member.image"
              style="width: 32px"
            />
            <div>
              <span class="font-medium">{{ member.name }}</span>
              <div class="text-sm text-muted-color">{{ member.email }}</div>
            </div>
            <div class="flex items-center gap-2 text-muted-color ml-auto text-sm">
              <span>{{ member.role }}</span>
              <i class="pi pi-angle-down"></i>
            </div>
          </li>
          }
        </ul>
      </div>
    </div>
  </p-popover>
</div>
